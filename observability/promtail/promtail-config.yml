server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: user-management-app
    static_configs:
      - targets:
          - localhost
        labels:
          job: user-management-app
          service: user-management-service
          __path__: /var/log/app/*.log
