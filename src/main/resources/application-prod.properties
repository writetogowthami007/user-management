# Production profile (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/user_management}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:app_user}
spring.datasource.password=${DB_PASSWORD:app_password}

spring.flyway.url=${FLYWAY_URL:${DB_URL:jdbc:postgresql://localhost:5432/user_management}}
spring.flyway.user=${FLYWAY_USER:postgres}
spring.flyway.password=${FLYWAY_PASSWORD:postgres}

spring.jpa.show-sql=false
spring.h2.console.enabled=false
logging.file.name=${APP_LOG_FILE:./logs/user-management-service.log}
