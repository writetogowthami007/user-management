# Server Configuration
server.port=8080
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Logging Configuration
logging.level.org.springframework=INFO
logging.level.com.example.usermanagementservice=INFO
logging.pattern.level=%5p [corr:%X{correlationId:-na}] [trace:%X{traceId:-na} span:%X{spanId:-na}]

# Application Configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:8080}
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}
app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:100}
app.rate-limit.refill-tokens=${RATE_LIMIT_REFILL_TOKENS:100}
app.rate-limit.refill-minutes=${RATE_LIMIT_REFILL_MINUTES:1}
app.rate-limit.eviction-check-interval-ms=${RATE_LIMIT_EVICTION_CHECK_INTERVAL_MS:5000}
app.rate-limit.trust-forwarded-for=${RATE_LIMIT_TRUST_FORWARDED_FOR:false}
app.rate-limit.max-clients=${RATE_LIMIT_MAX_CLIENTS:10000}
app.request.max-body-bytes=${APP_MAX_REQUEST_BODY_BYTES:1048576}

# Connection Pool (HikariCP) Configuration
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.validation-timeout=${DB_POOL_VALIDATION_TIMEOUT_MS:5000}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.tracing.enabled=true
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:1.0}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}